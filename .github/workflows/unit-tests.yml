name: Unit Tests

on:
  push:
    branches: [main, AI]
  pull_request:
    branches: [main, AI]

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install "playwright==1.58.0" "cryptography==46.0.6" "keyring>=24.0.0" pytest pip-audit

      - name: Run unit tests
        run: python -m pytest test_automation_core.py test_credential_store.py test_audit_log.py -v --tb=short

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt --desc on
